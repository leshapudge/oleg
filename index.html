<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Олег — получай</title>
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=DM+Sans:wght@500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <div id="fx-layer"></div>

  <div class="game">
    <header class="hud">
      <div class="hud-brand">
        <span class="logo">ОЛЕГ</span>
        <span class="hud-zone" id="place-line">Двор · волна 1</span>
      </div>
      <div class="hud-stats">
        <div class="stat-pill stat-coins">
          <span class="stat-ico">💰</span>
          <span class="stat-val" id="coins">0</span>
        </div>
        <div class="stat-pill stat-lvl">
          <span class="stat-ico">⚡</span>
          <span>ур. <b id="player-level">1</b></span>
          <div class="stat-xp"><div class="xp-fill" id="xp-fill"></div></div>
        </div>
      </div>
      <button type="button" class="hud-help" id="btn-help" title="Помощь">?</button>
    </header>

    <div class="game-body">
      <nav class="dock" id="dock" aria-label="Меню"></nav>

      <main class="arena">
        <div class="objective" id="objective">
          <span class="obj-label">Цель</span>
          <span class="obj-text" id="objective-text">Жми по жопе</span>
          <span class="obj-reward" id="objective-reward"></span>
        </div>

        <article class="combat-card">
          <header class="combat-head">
            <span class="enemy-type" id="enemy-badge">Олег</span>
            <span class="enemy-lvl" id="enemy-level">ур. 1</span>
            <div class="combat-names">
              <h2 id="enemy-name">Олег-дворник</h2>
              <p id="enemy-quote">«Я тут просто сорняки полол, бля»</p>
            </div>
          </header>

          <div class="hp-box">
            <div class="hp-top">
              <span>Жопа</span>
              <span id="enemy-hp-text">100 / 100</span>
            </div>
            <div class="hp-bar"><div class="hp-fill" id="enemy-hp-fill"></div></div>
            <div class="shield-row hidden" id="shield-row">
              <span class="shield-label">🛡 Щит</span>
              <div class="shield-bar"><div class="shield-fill" id="shield-fill"></div></div>
            </div>
          </div>

          <p class="boss-warn hidden" id="boss-warn">⚠ Босс сбежит через <b id="boss-timer">30</b> сек</p>

          <div class="stage bg-yard" id="stage">
            <button class="spot spot-l hidden" id="weak-left" type="button">x3</button>
            <button class="spot spot-r hidden" id="weak-right" type="button">x3</button>
            <button class="parry hidden" id="parry-prompt" type="button">ОТБИТЬ!</button>
            <button class="hit-btn" id="click-target" type="button">
              <div class="oleg-wrap" id="oleg-char"></div>
              <span class="hit-label">ХУЕМ В ЖОПУ</span>
            </button>
          </div>

          <div class="meters">
            <div class="meter" title="Комбо">
              <span class="meter-label">Комбо <b id="combo-mult">x1</b></span>
              <div class="meter-track"><div class="meter-fill meter-combo" id="combo-fill"></div></div>
            </div>
            <div class="meter" title="Выносливость">
              <span class="meter-label">Силы</span>
              <div class="meter-track"><div class="meter-fill meter-stamina" id="stamina-fill"></div></div>
            </div>
            <div class="meter" title="Жар">
              <span class="meter-label">Жар</span>
              <div class="meter-track"><div class="meter-fill meter-heat" id="heat-fill"></div></div>
            </div>
            <div class="meter meter-rage hidden" id="oleg-rage-wrap" title="Злость олега">
              <span class="meter-label">Злость олега</span>
              <div class="meter-track"><div class="meter-fill meter-oleg" id="oleg-rage-fill"></div></div>
            </div>
          </div>

          <div class="strike-row">
            <button type="button" class="heavy-btn hidden" id="heavy-strike">💥 Мощный хуй</button>
          </div>

          <div class="combat-stats">
            <span>Удар <b id="dpc-display">1</b></span>
            <span>Авто <b id="dps-display">0</b>/с</span>
            <span>Олег <b id="enemy-atk-display">3</b> ATK</span>
          </div>

          <div class="equip-mini" id="equip-mini"></div>
        </article>

        <div class="skills-row hidden" id="skills-wrap">
          <div class="skills" id="skills-dock"></div>
        </div>
        <p class="tip-line" id="event-ticker">Жми → бабки → качайся → доминируй</p>
      </main>

      <aside class="side-panel">
        <header class="panel-head">
          <h3 id="panel-title">Прогресс</h3>
        </header>
        <div class="panel-body" id="panel-content"></div>
      </aside>
    </div>
  </div>

  <div class="modal hidden" id="modal-overlay">
    <div class="modal-box">
      <button type="button" class="modal-x" id="modal-close">×</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <div class="unlock-toast hidden" id="unlock-toast">
    <div class="unlock-inner">
      <span class="unlock-ico" id="unlock-ico">🎉</span>
      <div>
        <b id="unlock-title">Новое!</b>
        <p id="unlock-text"></p>
      </div>
      <button type="button" class="unlock-ok" id="unlock-ok">Понял</button>
    </div>
  </div>

  <div class="toasts" id="toasts"></div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
