<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Олег — получай</title>
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <div id="fx-layer"></div>

  <div class="shell">
    <header class="top">
      <div class="title-block">
        <h1>ОЛЕГ — ПОЛУЧАЙ</h1>
        <p id="place-line">Двор · волна 1</p>
      </div>
      <div class="money-big">
        <span class="money-label">Бабки</span>
        <span class="money-val" id="coins">0</span>
      </div>
      <p class="hint-top" id="hint-top">Жми по жопе. Копишь бабки. Качаешь хуй. Всё.</p>
    </header>

    <main class="main-row">
      <section class="fight-zone">
        <div class="enemy-card">
          <span class="enemy-type" id="enemy-badge">Обычный олег</span>
          <h2 class="enemy-title" id="enemy-name">Олег</h2>
          <p class="enemy-quote" id="enemy-quote">«Я ничего не делал!»</p>

          <div class="hp-box">
            <div class="hp-top"><span>Жопа олега</span><span id="enemy-hp-text">100 / 100</span></div>
            <div class="hp-bar"><div class="hp-fill" id="enemy-hp-fill"></div></div>
          </div>

          <p class="boss-warn hidden" id="boss-warn">⚠ Босс сбежит через <b id="boss-timer">30</b> сек — долби быстрее!</p>

          <div class="stage">
            <button class="spot spot-l hidden" id="weak-left" type="button">x3<br><small>сюда!</small></button>
            <button class="spot spot-r hidden" id="weak-right" type="button">x3<br><small>сюда!</small></button>
            <button class="parry hidden" id="parry-prompt" type="button">ОТБИЛ!</button>

            <button class="hit-btn" id="click-target" type="button">
              <div class="oleg type-yard" id="oleg-char">
                <div class="acc" id="oleg-acc"></div>
                <div class="oleg-head"><div class="face"></div></div>
                <div class="oleg-shirt" id="oleg-shirt"></div>
                <div class="oleg-ass" id="hit-zone"></div>
                <div class="flash"></div>
              </div>
              <span class="hit-label">ЖМИ ПО ЖОПЕ</span>
            </button>
          </div>

          <div class="simple-stats">
            <span>Удар: <b id="dpc-display">1</b></span>
            <span>Комбо: <b id="combo-mult">x1</b> (<span id="combo-count">0</span>)</span>
            <span>Авто: <b id="dps-display">0</b>/сек</span>
          </div>

          <div class="combo-bar-wrap">
            <div class="combo-bar"><div class="combo-fill" id="combo-fill"></div></div>
          </div>

          <div class="skills" id="skills-dock"></div>
        </div>

        <p class="tip-line" id="event-ticker">Короче: кликай, качай, profit.</p>
      </section>

      <aside class="shop-zone">
        <div class="lvl-box">
          <span>Ты ур. <b id="player-level">1</b></span>
          <div class="xp-bar"><div class="xp-fill" id="xp-fill"></div></div>
        </div>

        <nav class="tabs">
          <button class="tab active" data-tab="weapon">Хуй</button>
          <button class="tab" data-tab="crew">Братва</button>
          <button class="tab" data-tab="more">Ещё</button>
        </nav>
        <div class="shop-list" id="shop-content"></div>

        <button class="help-btn" id="btn-help">❓ Как играть</button>
      </aside>
    </main>
  </div>

  <div class="modal hidden" id="modal-overlay">
    <div class="modal-box">
      <button class="modal-x" id="modal-close">×</button>
      <div id="modal-body"></div>
    </div>
  </div>
  <div class="toasts" id="toasts"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
